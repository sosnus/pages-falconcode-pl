{{ define "main" }}
  <div style="background: url('{{ .Params.featured_image }}') center/cover; height: 300px; display: flex; align-items: center; justify-content: center;">
    <h1 style="color: white; font-size: 3rem; font-weight: bold; text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.7);">{{ .Title }}</h1>
  </div>
  <article class="pt4 pb4" style="max-width: 900px; margin: 0 auto;">
    <section class="w-100 mw-none ph4 ph0-l">
      {{ .Content }}
    </section>
    <H1>test</H1>
  </article>
{{ end }}
